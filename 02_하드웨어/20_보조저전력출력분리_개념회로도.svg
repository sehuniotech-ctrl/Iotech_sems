<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980">
  <defs>
    <style>
      .bg { fill: #f7f6f2; }
      .title { font: 700 34px 'Malgun Gothic', sans-serif; fill: #1f2937; }
      .label { font: 600 20px 'Malgun Gothic', sans-serif; fill: #1f2937; }
      .text { font: 16px 'Malgun Gothic', sans-serif; fill: #374151; }
      .small { font: 14px 'Malgun Gothic', sans-serif; fill: #4b5563; }
      .box { fill: #ffffff; stroke: #1f2937; stroke-width: 2.5; rx: 14; ry: 14; }
      .boxBlue { fill: #e8f1ff; stroke: #2457a6; stroke-width: 2.5; rx: 14; ry: 14; }
      .boxGreen { fill: #e9f8ef; stroke: #1f7a46; stroke-width: 2.5; rx: 14; ry: 14; }
      .boxOrange { fill: #fff3e6; stroke: #c46b12; stroke-width: 2.5; rx: 14; ry: 14; }
      .boxGray { fill: #f3f4f6; stroke: #6b7280; stroke-width: 2.5; rx: 14; ry: 14; }
      .section { fill: none; stroke: #9ca3af; stroke-width: 2; stroke-dasharray: 8 6; rx: 18; ry: 18; }
      .linePower { stroke: #111827; stroke-width: 4; fill: none; }
      .lineAux { stroke: #1f7a46; stroke-width: 4; fill: none; }
      .lineSig { stroke: #2457a6; stroke-width: 3.5; fill: none; }
      .lineCtrl { stroke: #c46b12; stroke-width: 3.5; fill: none; }
      .arrow { marker-end: url(#arrow); }
      .arrowGreen { marker-end: url(#arrowGreen); }
      .arrowBlue { marker-end: url(#arrowBlue); }
      .arrowOrange { marker-end: url(#arrowOrange); }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 z" fill="#111827"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 z" fill="#1f7a46"/>
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 z" fill="#2457a6"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 z" fill="#c46b12"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1600" height="980"/>

  <text class="title" x="60" y="60">Smart Load 보조 저전력 출력 분리 개념 회로도</text>
  <text class="text" x="60" y="95">대기전력 차단 시 메인 부하는 완전 차단하고, MCU/통신/복구 입력은 보조 전원으로 유지하는 구조</text>

  <rect class="section" x="40" y="130" width="1520" height="360" rx="18" ry="18"/>
  <text class="label" x="60" y="165">메인 전력 경로</text>

  <rect class="boxGray" x="80" y="220" width="170" height="90"/>
  <text class="label" x="125" y="275">AC 입력</text>

  <rect class="boxGray" x="320" y="220" width="190" height="90"/>
  <text class="label" x="368" y="275">입력 보호부</text>
  <text class="small" x="358" y="302">Fuse / MOV / EMI</text>

  <rect class="boxOrange" x="590" y="205" width="220" height="120"/>
  <text class="label" x="638" y="255">메인 릴레이</text>
  <text class="text" x="625" y="285">대기전력 차단 시 OFF</text>

  <rect class="boxBlue" x="900" y="220" width="220" height="90"/>
  <text class="label" x="952" y="275">ATM90E26-YU</text>
  <text class="small" x="950" y="302">계량칩</text>

  <rect class="box" x="1210" y="220" width="220" height="90"/>
  <text class="label" x="1288" y="275">부하</text>
  <text class="small" x="1252" y="302">조명 / PC / OA 기기</text>

  <path class="linePower arrow" d="M250 265 L320 265"/>
  <path class="linePower arrow" d="M510 265 L590 265"/>
  <path class="linePower arrow" d="M810 265 L900 265"/>
  <path class="linePower arrow" d="M1120 265 L1210 265"/>

  <text class="small" x="630" y="195">릴레이 ON: 정상 공급</text>
  <text class="small" x="620" y="348">릴레이 OFF: 메인 부하 차단</text>

  <rect class="section" x="40" y="530" width="1520" height="360" rx="18" ry="18"/>
  <text class="label" x="60" y="565">보조 저전력 경로 및 제어 경로</text>

  <rect class="boxGreen" x="280" y="640" width="230" height="100"/>
  <text class="label" x="330" y="695">보조 저전력 전원</text>
  <text class="small" x="340" y="723">소형 SMPS / Aux PSU</text>

  <rect class="boxBlue" x="620" y="620" width="220" height="120"/>
  <text class="label" x="682" y="675">Main MCU</text>
  <text class="small" x="650" y="705">Smart Load 제어 / 복구 판단</text>

  <rect class="boxBlue" x="930" y="620" width="220" height="120"/>
  <text class="label" x="980" y="675">RS-485 / DCU</text>
  <text class="small" x="970" y="705">통신 유지</text>

  <rect class="boxGreen" x="1240" y="620" width="240" height="120"/>
  <text class="label" x="1305" y="675">Wake-up 입력</text>
  <text class="small" x="1270" y="705">RTU / 버튼 / 외부 입력</text>

  <path class="lineAux arrowGreen" d="M395 640 L395 590 L730 590 L730 620"/>
  <path class="lineAux arrowGreen" d="M395 640 L395 590 L1040 590 L1040 620"/>
  <path class="lineAux arrowGreen" d="M395 640 L395 590 L1360 590 L1360 620"/>

  <path class="lineSig arrowBlue" d="M1010 310 L1010 560 L840 560 L840 660"/>
  <text class="small" x="845" y="550">계측값</text>

  <path class="lineSig arrowBlue" d="M1150 680 L1240 680"/>
  <text class="small" x="1168" y="665">현장 입력</text>

  <path class="lineCtrl arrowOrange" d="M730 620 L730 480 L700 480 L700 325"/>
  <text class="small" x="714" y="470">릴레이 제어</text>

  <path class="lineSig arrowBlue" d="M840 680 L930 680"/>
  <text class="small" x="855" y="665">상태 / 응답</text>

  <rect class="boxGray" x="1180" y="790" width="320" height="70"/>
  <text class="text" x="1200" y="820">핵심: 릴레이 OFF 시에도 MCU와 통신부는 계속 동작</text>
  <text class="text" x="1200" y="845">부하는 완전 차단, 복구는 RTU/DCU/스케줄로 수행</text>

  <rect class="boxGray" x="80" y="790" width="480" height="70"/>
  <text class="text" x="100" y="820">장점: 저항 직렬 방식보다 발열 리스크가 낮음</text>
  <text class="text" x="100" y="845">주의: 보조 전원부는 절연/안전 규격 기준으로 설계 필요</text>
</svg>
