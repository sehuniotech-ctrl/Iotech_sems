<svg xmlns="http://www.w3.org/2000/svg" width="1700" height="1100" viewBox="0 0 1700 1100">
  <defs>
    <style>
      .bg { fill: #faf8f3; }
      .title { font: 700 34px 'Malgun Gothic', sans-serif; fill: #1f2937; }
      .subtitle { font: 17px 'Malgun Gothic', sans-serif; fill: #4b5563; }
      .label { font: 700 18px 'Malgun Gothic', sans-serif; fill: #1f2937; }
      .text { font: 15px 'Malgun Gothic', sans-serif; fill: #374151; }
      .small { font: 13px 'Malgun Gothic', sans-serif; fill: #6b7280; }
      .line { stroke: #111827; stroke-width: 4; fill: none; }
      .lineAux { stroke: #166534; stroke-width: 4; fill: none; }
      .lineSig { stroke: #1d4ed8; stroke-width: 3; fill: none; stroke-dasharray: 0; }
      .lineCtrl { stroke: #b45309; stroke-width: 3; fill: none; }
      .zone { fill: none; stroke: #9ca3af; stroke-width: 2; stroke-dasharray: 8 8; rx: 18; ry: 18; }
      .box { fill: #fff; stroke: #111827; stroke-width: 2.5; rx: 14; ry: 14; }
      .boxAux { fill: #ecfdf5; stroke: #166534; stroke-width: 2.5; rx: 14; ry: 14; }
      .boxSig { fill: #eff6ff; stroke: #1d4ed8; stroke-width: 2.5; rx: 14; ry: 14; }
      .boxWarn { fill: #fff7ed; stroke: #c2410c; stroke-width: 2.5; rx: 14; ry: 14; }
    </style>
    <marker id="arrowB" markerWidth="12" markerHeight="12" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 z" fill="#111827"/>
    </marker>
    <marker id="arrowG" markerWidth="12" markerHeight="12" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 z" fill="#166534"/>
    </marker>
    <marker id="arrowU" markerWidth="12" markerHeight="12" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 z" fill="#1d4ed8"/>
    </marker>
    <marker id="arrowO" markerWidth="12" markerHeight="12" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 z" fill="#b45309"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1700" height="1100"/>
  <text class="title" x="60" y="58">Smart Load 보조 저전력 출력 분리 준회로도</text>
  <text class="subtitle" x="60" y="92">설명용 준회로도이며, 실제 부품값/안전거리/절연/인증 설계는 HW 검토 후 확정 필요</text>

  <rect class="zone" x="40" y="130" width="1620" height="410"/>
  <text class="label" x="60" y="163">A. 메인 전력 경로</text>

  <rect class="box" x="70" y="240" width="150" height="90"/>
  <text class="label" x="108" y="293">AC IN</text>

  <rect class="boxWarn" x="270" y="225" width="220" height="120"/>
  <text class="label" x="320" y="272">입력 보호부</text>
  <text class="text" x="315" y="302">Fuse / MOV / EMI Filter</text>

  <rect class="boxWarn" x="560" y="225" width="220" height="120"/>
  <text class="label" x="617" y="272">메인 릴레이</text>
  <text class="text" x="598" y="302">과전압/차단 제어용</text>

  <rect class="boxSig" x="860" y="225" width="250" height="120"/>
  <text class="label" x="932" y="272">ATM90E26-YU</text>
  <text class="text" x="900" y="302">전압/전류/전력 계측</text>

  <rect class="box" x="1195" y="225" width="380" height="120"/>
  <text class="label" x="1348" y="272">부하 출력</text>
  <text class="text" x="1235" y="302">조명 / OA 기기 / 소형 전자기기</text>

  <path class="line" marker-end="url(#arrowB)" d="M220 285 L270 285"/>
  <path class="line" marker-end="url(#arrowB)" d="M490 285 L560 285"/>
  <path class="line" marker-end="url(#arrowB)" d="M780 285 L860 285"/>
  <path class="line" marker-end="url(#arrowB)" d="M1110 285 L1195 285"/>

  <text class="small" x="836" y="372">계량칩은 메인 전력 경로 상에 위치</text>
  <text class="small" x="1210" y="372">릴레이 OFF 시 메인 부하는 완전 차단</text>

  <rect class="boxWarn" x="1140" y="420" width="440" height="85"/>
  <text class="text" x="1160" y="455">주의: 이 구조는 "저항으로 부하를 약하게 공급"하는 방식이 아님</text>
  <text class="text" x="1160" y="480">메인 부하는 완전히 끊고, 보조 전원은 제어부에만 공급함</text>

  <rect class="zone" x="40" y="590" width="1620" height="440"/>
  <text class="label" x="60" y="623">B. 보조 저전력 전원 및 복구 제어 경로</text>

  <rect class="boxAux" x="180" y="700" width="260" height="120"/>
  <text class="label" x="238" y="748">보조 전원부</text>
  <text class="text" x="214" y="778">절연형 Aux SMPS 권장</text>
  <text class="small" x="225" y="804">MCU / 통신 / 입력부 유지용</text>

  <rect class="boxSig" x="540" y="690" width="260" height="140"/>
  <text class="label" x="620" y="740">Main MCU</text>
  <text class="text" x="578" y="770">Smart Load 제어</text>
  <text class="text" x="566" y="796">대기전력 차단 / 복구 판단</text>

  <rect class="boxSig" x="900" y="700" width="260" height="120"/>
  <text class="label" x="955" y="748">RS-485 / DCU</text>
  <text class="text" x="953" y="778">통신 유지</text>

  <rect class="boxAux" x="1260" y="690" width="280" height="140"/>
  <text class="label" x="1338" y="740">Wake-up 입력부</text>
  <text class="text" x="1305" y="770">RTU / 외부 버튼 / 접점 입력</text>
  <text class="small" x="1322" y="798">필요 시 디바운스 / 절연 추가</text>

  <path class="lineAux" marker-end="url(#arrowG)" d="M310 700 L310 650 L670 650 L670 690"/>
  <path class="lineAux" marker-end="url(#arrowG)" d="M310 700 L310 650 L1030 650 L1030 700"/>
  <path class="lineAux" marker-end="url(#arrowG)" d="M310 700 L310 650 L1400 650 L1400 690"/>

  <path class="lineSig" marker-end="url(#arrowU)" d="M985 345 L985 610 L800 610 L800 748"/>
  <text class="small" x="805" y="600">계측값 / 상태</text>

  <path class="lineCtrl" marker-end="url(#arrowO)" d="M670 690 L670 575 L670 575 L670 345"/>
  <text class="small" x="685" y="560">릴레이 제어 신호</text>

  <path class="lineSig" marker-end="url(#arrowU)" d="M800 760 L900 760"/>
  <text class="small" x="812" y="744">전송 데이터</text>

  <path class="lineSig" marker-end="url(#arrowU)" d="M1260 760 L800 760"/>
  <text class="small" x="1095" y="790">복구 요청</text>

  <rect class="box" x="70" y="880" width="620" height="100"/>
  <text class="text" x="95" y="916">핵심 동작</text>
  <text class="text" x="95" y="944">1) 대기전력 판단 시 메인 릴레이 OFF</text>
  <text class="text" x="95" y="968">2) MCU/DCU/입력부는 보조 전원으로 계속 유지</text>

  <rect class="box" x="760" y="880" width="820" height="100"/>
  <text class="text" x="785" y="916">복구 조건 예시</text>
  <text class="text" x="785" y="944">RTU 입력 / 서버 명령 / 스케줄 복구 / 외부 wake-up 입력</text>
  <text class="text" x="785" y="968">열 최소화 목적: 저항 직렬 약전력 공급 대신 제어부만 유지</text>
</svg>
